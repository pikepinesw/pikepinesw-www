<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pike & Pine Software | Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex flex-col min-h-screen bg-white text-slate-800">

    <!-- Nav -->
    <header class="border-b border-slate-200 bg-white">
        <nav class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html">
                <img src="assets/images/logo_pikeandpine.png" alt="Pike & Pine Software" class="h-12 w-auto">
            </a>
            <button id="menu-toggle" class="sm:hidden p-2 rounded text-slate-600 hover:bg-slate-100" aria-label="Toggle menu">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <ul id="nav-links" class="hidden sm:flex gap-6 text-sm font-medium text-slate-600">
                <li><a href="index.html" class="hover:text-green-700 transition-colors">Home</a></li>
                <li><a href="products.html" class="hover:text-green-700 transition-colors">Products</a></li>
                <li><a href="docs.html" class="hover:text-green-700 transition-colors">Docs</a></li>
            </ul>
        </nav>
        <div id="mobile-menu" class="hidden sm:hidden border-t border-slate-100 bg-white px-4 py-3">
            <ul class="flex flex-col gap-3 text-sm font-medium text-slate-600">
                <li><a href="index.html" class="hover:text-green-700">Home</a></li>
                <li><a href="products.html" class="hover:text-green-700">Products</a></li>
                <li><a href="docs.html" class="hover:text-green-700">Docs</a></li>
            </ul>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1">
        <section class="max-w-2xl mx-auto px-4 py-16">
            <h1 class="text-4xl font-bold text-slate-900 mb-3">Contact</h1>
            <p class="text-slate-500 text-lg mb-10">
                Have a question, idea, or just want to say hello? We'd love to hear from you.
            </p>

            <form action="https://formspree.io/f/placeholder" method="POST" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        placeholder="Your name"
                        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent"
                    >
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="you@example.com"
                        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent"
                    >
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-slate-700 mb-1.5">Message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="5"
                        required
                        placeholder="What's on your mind?"
                        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent resize-none"
                    ></textarea>
                </div>
                <button
                    type="submit"
                    class="bg-green-700 text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:bg-green-800 transition-colors"
                >
                    Send Message
                </button>
            </form>

            <p class="mt-8 text-sm text-slate-400">
                Prefer email? Reach us at
                <a href="mailto:hello@pikepinesw.com" class="text-green-700 hover:underline">hello@pikepinesw.com</a>
            </p>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 bg-slate-50">
        <div class="max-w-5xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-slate-500">
            <span>&copy; 2026 Pike & Pine Software LLC</span>
            <div class="flex gap-5">
                <a href="contact.html" class="hover:text-green-700 transition-colors">Contact</a>
                <a href="about.html" class="hover:text-green-700 transition-colors">About</a>
                <a href="privacy.html" class="hover:text-green-700 transition-colors">Privacy</a>
                <a href="terms.html" class="hover:text-green-700 transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    <script>
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('mobile-menu');
        toggle.addEventListener('click', () => menu.classList.toggle('hidden'));
    </script>
</body>
</html>
